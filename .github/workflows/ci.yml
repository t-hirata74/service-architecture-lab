name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slack-backend:
    name: slack / backend (Rails)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: slack_test
          MYSQL_USER: slack
          MYSQL_PASSWORD: slack
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    defaults:
      run:
        working-directory: slack/backend

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: slack
      DB_PASSWORD: slack
      REDIS_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.1"
          bundler-cache: true
          working-directory: slack/backend

      - name: Grant slack_* DB privileges
        run: |
          mysql -h 127.0.0.1 -uroot -proot \
            -e "GRANT ALL PRIVILEGES ON \`slack\_%\`.* TO 'slack'@'%'; FLUSH PRIVILEGES;"

      - name: Database create + migrate
        run: bundle exec rails db:create db:migrate

      - name: Rails tests (minitest)
        run: bundle exec rails test

  slack-frontend:
    name: slack / frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slack/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: slack/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  slack-terraform:
    name: slack / infra (terraform validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slack/infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.0"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  slack-ai-worker:
    name: slack / ai-worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slack/ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: slack/ai-worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke test
        run: python -c "import main; print('main import OK')"

      - name: Boot smoke test
        run: |
          uvicorn main:app --port 8000 &
          PID=$!
          sleep 3
          curl -fsS http://localhost:8000/health
          kill $PID

  youtube-backend:
    name: youtube / backend (Rails RSpec)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: youtube_test
          MYSQL_USER: youtube
          MYSQL_PASSWORD: youtube
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: youtube/backend

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: youtube
      DB_PASSWORD: youtube

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.1"
          bundler-cache: true
          working-directory: youtube/backend

      - name: Grant youtube_* DB privileges
        run: |
          mysql -h 127.0.0.1 -uroot -proot \
            -e "GRANT ALL PRIVILEGES ON \`youtube\_%\`.* TO 'youtube'@'%'; FLUSH PRIVILEGES;"

      - name: Database create + migrate
        run: bundle exec rails db:create db:migrate

      - name: RSpec
        run: bundle exec rspec

  youtube-frontend:
    name: youtube / frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: youtube/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  youtube-terraform:
    name: youtube / infra (terraform validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube/infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.0"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  youtube-ai-worker:
    name: youtube / ai-worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube/ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: youtube/ai-worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke test
        run: python -c "import main; print('main import OK')"

      - name: Boot smoke test
        run: |
          uvicorn main:app --port 8010 &
          PID=$!
          sleep 3
          curl -fsS http://localhost:8010/health
          kill $PID

  openapi-lint:
    name: openapi (lint slack + youtube schemas)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Lint slack OpenAPI
        run: redocly lint slack/backend/docs/openapi.yml

      - name: Lint youtube OpenAPI
        run: redocly lint youtube/backend/docs/openapi.yml
