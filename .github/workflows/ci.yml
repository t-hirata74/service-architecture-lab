      - name: Database create + migrate
        run: bundle exec rails db:create db:migrate

      - name: RSpec
        run: bundle exec rspec

      - name: GraphQL schema export is up to date
        run: |
          bundle exec rake graphql:dump_schema
          git diff --exit-code docs/schema.graphql

  github-frontend:
    name: github / frontend (Next.js + urql)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github/frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: github/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  github-ai-worker:
    name: github / ai-worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github/ai-worker

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: github/ai-worker/requirements.txt

