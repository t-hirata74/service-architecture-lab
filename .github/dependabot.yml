# 各サービスの依存関係を集約して Dependabot で更新追従する。
# 個別 .github/dependabot.yml は持たず、ルートに集約する。
#
# 配線方針:
#   - 全サービス (slack / youtube / github / perplexity / instagram /
#     discord / reddit / shopify / zoom / calendly) に同一の 5 軸
#     (backend / frontend / playwright / ai-worker / infra/terraform) を配線。
#   - backend の package-ecosystem はサービスごとに異なる:
#       Rails 系 (slack / youtube / github / perplexity / shopify / zoom / calendly)
#         → bundler
#       Django (instagram) / FastAPI (reddit) → pip
#       Go (discord) → gomod
#   - frontend の Next.js 関連は `next` group で 1 PR に集約。
#   - 更新 PR は .github/workflows/dependabot-auto-merge.yml が日次バッチで自動 merge。
#     patch / minor / major を区別せず、"CI" workflow が green なものだけ取り込む
#     (破壊的変更は CI で検知して fix-forward する方針)。
version: 2
updates:
  # ==== GitHub Actions (共通) ====
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    labels: ["deps", "ci"]

  # ==== slack ====
  - package-ecosystem: bundler
    directory: /slack/backend
    schedule:
      interval: daily
    labels: ["deps", "slack/backend"]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /slack/frontend
    schedule:
      interval: daily
    labels: ["deps", "slack/frontend"]
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@types/react*"

  - package-ecosystem: npm
    directory: /slack/playwright
    schedule:
      interval: daily
    labels: ["deps", "slack/playwright"]

  - package-ecosystem: pip
    directory: /slack/ai-worker
    schedule:
      interval: daily
    labels: ["deps", "slack/ai-worker"]

  - package-ecosystem: terraform
    directory: /slack/infra/terraform
    schedule:
      interval: daily
    labels: ["deps", "slack/infra"]

