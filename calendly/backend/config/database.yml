# MySQL 8 (本リポ統一)。docker-compose で host port 3326 にマップしている。
# 本番想定: infra/terraform で RDS MySQL 8.0 を分離 DB として複数定義 (cache / queue / cable)。
default: &default
  adapter: mysql2
  encoding: utf8mb4
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USER") { "root" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "root" } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3326 } %>

development:
  primary:
    <<: *default
    database: calendly_development
  cache:
    <<: *default
    database: calendly_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: calendly_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: calendly_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: calendly_test
  cache:
    <<: *default
    database: calendly_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: calendly_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: calendly_test_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    database: calendly_production
    username: calendly
    password: <%= ENV["CALENDLY_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: calendly_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: calendly_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: calendly_production_cable
    migrations_paths: db/cable_migrate
