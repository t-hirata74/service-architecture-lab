default: &default
  adapter: mysql2
  encoding: utf8mb4
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: root
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3316 } %>

development:
  <<: *default
  database: zoom_development

test:
  <<: *default
  database: zoom_test

production:
  <<: *default
  database: zoom_production
