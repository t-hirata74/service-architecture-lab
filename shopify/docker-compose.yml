services:
  mysql:
    image: mysql:8.0
    container_name: shopify-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopify_development
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3315:3306"
    volumes:
      - shopify-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  shopify-mysql-data:
