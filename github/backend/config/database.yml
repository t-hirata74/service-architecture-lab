default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USER") { "github" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "github" } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3309 } %>

development:
  <<: *default
  database: github_development

test:
  <<: *default
  database: github_test

production:
  primary: &primary_production
    <<: *default
    database: github_production
  cache:
    <<: *primary_production
    database: github_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: github_production_queue
    migrations_paths: db/queue_migrate
