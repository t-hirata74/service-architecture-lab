default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_0900_ai_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "slack" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "slack" } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3307 } %>

development:
  <<: *default
  database: slack_development

test:
  <<: *default
  database: slack_test

production:
  primary: &primary_production
    <<: *default
    database: slack_production
    password: <%= ENV["BACKEND_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: slack_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: slack_production_queue
    migrations_paths: db/queue_migrate
